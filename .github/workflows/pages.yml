# 将静态游戏站点发布到 GitHub Pages（推送 main 或手动运行）
# 前提： 仓库 Settings → Pages → Build and deployment → Source 选 "GitHub Actions" 并保存

name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site (exclude dev-only folders)
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            ./ _site/
          touch _site/.nojekyll

      # 不使用 actions/configure-pages：在未于仓库 Settings → Pages 启用「GitHub Actions」源时，
      # 该 action 会因 GET /pages 返回 404 而失败；纯静态站点也不需要其 SSG 配置能力。

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
