# 将静态游戏站点发布到 GitHub Pages（推送 main 或手动运行）
# 使用前请在仓库 Settings → Pages → Source 选择 "GitHub Actions"

name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site (exclude dev-only folders)
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            ./ _site/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
